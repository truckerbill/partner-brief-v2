name: Executive Partner Brief (v2 - Perplexity)

on:
  schedule:
    # Mondays at 09:00 CET (08:00 UTC)
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

jobs:
  build_and_send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build brief HTML (Perplexity)
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PPLX_MODEL: sonar
          PPLX_RECENCY: week
          PPLX_SLEEP_S: "0.8"
          BRIEF_TITLE: Executive Partner Brief (v2)
          BRIEF_OUT: out/executive_partner_brief_v2.html
          BRIEF_DEBUG_JSON: out/executive_partner_brief_v2.raw.json
        run: python build_brief.py

      - name: Send email via Apps Script
        env:
          BRIEF_OUT: out/executive_partner_brief_v2.html
          BRIEF_APPS_SCRIPT_URL: ${{ secrets.BRIEF_APPS_SCRIPT_URL }}
          BRIEF_SHARED_SECRET: ${{ secrets.BRIEF_SHARED_SECRET }}
          BRIEF_EMAIL_TO: ${{ secrets.BRIEF_EMAIL_TO }}
          BRIEF_EMAIL_SUBJECT: Executive Partner Brief (weekly, v2)
        run: python send_brief.py


      

        
