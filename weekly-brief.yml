name: Executive Partner Brief (v1 - RSS)

on:
  schedule:
    # Mondays at 09:00 CET (08:00 UTC)
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

jobs:
  build_and_send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build brief HTML (RSS)
        working-directory: v1 (rss)
        env:
          BRIEF_TITLE: Executive Partner Brief
          BRIEF_DAYS: "7"
          BRIEF_OUT: ../out/executive_partner_brief.html
          BRIEF_DEBUG_JSON: ../out/executive_partner_brief.items.json
        run: python build_brief.py

      - name: Send email via Apps Script
        working-directory: v1 (rss)
        env:
          BRIEF_OUT: ../out/executive_partner_brief.html
          BRIEF_APPS_SCRIPT_URL: ${{ secrets.BRIEF_APPS_SCRIPT_URL }}
          BRIEF_SHARED_SECRET: ${{ secrets.BRIEF_SHARED_SECRET }}
          BRIEF_EMAIL_TO: ${{ secrets.BRIEF_EMAIL_TO }}
          BRIEF_EMAIL_SUBJECT: Executive Partner Brief (weekly, v1)
        run: python send_brief.py

